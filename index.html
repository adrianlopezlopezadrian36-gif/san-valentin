<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para KYANI ❤️</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(270deg, #ff6b9d, #ee9ca7, #ffdde1);
  background-size: 600% 600%;
  animation: fondoAnimado 10s ease infinite;
}

@keyframes fondoAnimado {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  margin-top: 40px;
  color: #b3005e;
}

.mensaje {
  color: #7a003c;
  font-size: 1.2rem;
}

.contador {
  background: white;
  display: inline-block;
  padding: 15px 30px;
  border-radius: 20px;
  margin: 20px;
  font-size: 1.5rem;
}

.boton {
  margin-top: 20px;
  padding: 15px 30px;
  font-size: 1.2rem;
  background: #ff4d88;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.no {
  position: absolute;
}

#flores-container, #fondo-corazones {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.flor {
  position: absolute;
  font-size: 26px;
  animation: caer 4s linear forwards;
}

.corazon-fondo {
  position: absolute;
  color: rgba(255,0,100,0.3);
  animation: flotar 6s linear infinite;
}

@keyframes caer {
  0% { transform: translateY(-50px); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}

@keyframes flotar {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

.oculto {
  display: none;
  font-size: 1.5rem;
  color: #b3005e;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>❤️ con cariño bebesita jaja ❤️</h1>
<p class="mensaje">Te quiero mucho  💕</p>

<div class="contador" id="contador"></div>

<button onclick="mostrarFlores()" class="boton">🌸 Toca aquí</button>

<div id="flores-container"></div>
<div id="fondo-corazones"></div>

<div id="mensaje" class="oculto">
  <div id="texto"></div><br><br>

  <button class="boton" onclick="respuestaSi()">💖 Sí</button>
  <button class="boton no" onmouseenter="moverNo()">😜 No</button>
</div>

<audio id="audio" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9c7a98d9e1.mp3" type="audio/mpeg">
</audio><audio id="audio" loop>
  <source src="https://cdn.pixabay.com/audio/2023/03/14/audio_4c5e6d1f93.mp3" type="audio/mpeg">
</audio>

<script>
// CONTADOR
const inicio = new Date("2023-12-28");
function actualizar() {
  const hoy = new Date();
  const dias = Math.floor((hoy - inicio)/(1000*60*60*24));
  document.getElementById("contador").innerHTML = "⏳ " + dias + " días juntos";
}
actualizar();

// FLORES + MENSAJE
function mostrarFlores() {
  const contenedor = document.getElementById("flores-container");
  const emojis = ["🌸","🌹","💐","💖"];

  for (let i = 0; i < 40; i++) {
    const f = document.createElement("div");
    f.className = "flor";
    f.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    f.style.left = Math.random()*100 + "vw";
    contenedor.appendChild(f);
    setTimeout(()=>f.remove(),4000);
  }

  setTimeout(() => {
    document.getElementById("mensaje").style.display = "block";
    escribirTexto("kyani... desde que estás conmigo todo es diferente, eres la culona mas linda que conosco 💖\nEres lo mejor que me ha pasado 😍\n¿Quieres salir conmigo ? 💍",
      document.getElementById("texto"));
  }, 2000);
}

// TEXTO EFECTO
function escribirTexto(texto, elemento) {
  let i = 0;
  function escribir() {
    if (i < texto.length) {
      elemento.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribir, 40);
    }
  }
  escribir();
}

// BOTÓN NO ESCAPA
function moverNo() {
  const b = document.querySelector(".no");
  b.style.left = Math.random()*window.innerWidth + "px";
  b.style.top = Math.random()*window.innerHeight + "px";
}

// RESPUESTA SÍ
function respuestaSi() {
  document.body.innerHTML = `
    <h1 style="margin-top:40px; color:#b3005e;">
      💖 Sabía que dirías que sí 😍💍
    </h1>

    <p style="font-size:1.3rem;">Escríbeme algo bonito 💌</p>

    <textarea id="carta" placeholder="Escribe aquí..." 
      style="width:80%; max-width:400px; height:100px; border-radius:10px; padding:10px;"></textarea>
    
    <br><br>

    <button onclick="guardarTexto()" 
      style="padding:10px 20px; border:none; border-radius:10px; background:#ff4d88; color:white;">
      💾 Guardar
    </button>

    <p id="guardado" style="color:#b3005e; margin-top:10px;"></p>
  `;

  cargarTexto();
}

// MÚSICA
const audio = document.getElementById("audio");
document.body.addEventListener("click", ()=>{
  audio.play().catch(()=>{});
},{once:true});

// CORAZONES FONDO
setInterval(()=>{
  const c=document.createElement("div");
  c.className="corazon-fondo";
  c.innerHTML="❤";
  c.style.left=Math.random()*100+"vw";
  c.style.fontSize=(Math.random()*20+10)+"px";
  document.getElementById("fondo-corazones").appendChild(c);
  setTimeout(()=>c.remove(),7000);
},400);
function guardarTexto() {
  const texto = document.getElementById("carta").value;
  localStorage.setItem("mensajeAmor", texto);
  document.getElementById("guardado").innerText = "💖 Guardado para siempre";
}

function cargarTexto() {
  const texto = localStorage.getItem("mensajeAmor");
  if (texto) {
    document.getElementById("carta").value = texto;
  }
}
</script>

</body>
</html>
