<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Kyani ❤️</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(#ffdde1, #ee9ca7);
}

/* TITULO */
h1 {
  margin-top: 40px;
  color: #b3005e;
  font-size: 2.5rem;
}

/* MENSAJE */
.mensaje {
  font-size: 1.3rem;
  color: #7a003c;
}

/* CONTADOR */
.contador {
  background: white;
  display: inline-block;
  padding: 15px 30px;
  border-radius: 20px;
  margin: 20px;
  font-size: 1.5rem;
}

/* BOTÓN */
.boton {
  margin-top: 20px;
  padding: 15px 30px;
  font-size: 1.2rem;
  background: #ff4d88;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.boton:hover {
  transform: scale(1.1);
}

/* FLORES */
#flores-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.flor {
  position: absolute;
  font-size: 26px;
  animation: caer 4s linear forwards;
}

@keyframes caer {
  0% {
    transform: translateY(-50px) scale(0.5);
    opacity: 0;
  }
  50% { opacity: 1; }
  100% {
    transform: translateY(100vh) scale(1.2);
    opacity: 0;
  }
}

/* MENSAJE FINAL */
.oculto {
  display: none;
  font-size: 1.6rem;
  color: #b3005e;
  margin-top: 25px;
  animation: aparecer 1s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<h1>❤️ con cariño para kyani❤️</h1>
<p class="mensaje">Te quiero 💕</p>

<div class="contador" id="contador"></div>

<button onclick="mostrarFlores()" class="boton">
  🌸 Toca aquí
</button>

<div id="flores-container"></div>

<div id="mensaje" class="oculto">
  💖  eres la mejor que me ha pasado 💖<br><br>
  ¿Quieres salir conmigo ? 💍<br><br>

  <button class="boton" onclick="respuestaSi()">💖 Sí</button>
  <button class="boton no" onmouseover="moverNo()">😜 No</button>
</div>

}
<script>
// CONTADOR
const inicio = new Date("2023-12-28");

function actualizar() {
  const hoy = new Date();
  const dias = Math.floor((hoy - inicio) / (1000*60*60*24));
  document.getElementById("contador").innerHTML =
    "⏳ " + dias + " días conocerte";
}
actualizar();
function respuestaSi() {
  document.getElementById("mensaje").innerHTML =
    "💖 Sabía que dirías que sí 😍💍<br>Te amo muchísimo ❤️";
}

function moverNo() {
  const boton = document.querySelector(".no");
  const x = Math.random() * 200 - 100;
  const y = Math.random() * 200 - 100;

  boton.style.transform = `translate(${x}px, ${y}px)`;
}
// FLORES
function mostrarFlores() {
  const contenedor = document.getElementById("flores-container");

  const emojis = ["🌸","🌹","💐","💖"];

  for (let i = 0; i < 35; i++) {
    const flor = document.createElement("div");
    flor.className = "flor";
    flor.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    flor.style.left = Math.random() * 100 + "vw";
    flor.style.animationDuration = (Math.random() * 2 + 3) + "s";

    contenedor.appendChild(flor);

    setTimeout(() => flor.remove(), 4000);
  }

  setTimeout(() => {
    document.getElementById("mensaje").style.display = "block";
  }, 2000);
}
</script>

</body>
</html>
